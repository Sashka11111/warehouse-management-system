name: Release — Build Installers

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-installers:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'liberica'
          cache: maven

      - name: Install WiX Toolset (Windows only)
        if: matrix.os == 'windows-latest'
        run: |
          choco install wixtoolset --yes

      - name: Install RPM/DEB packaging tools (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot

      - name: Build Fat JAR
        run: mvn clean package -DskipTests

      - name: Prepare jpackage input
        shell: bash
        run: |
          mkdir -p jpackage-input
          cp target/warehouse-management-system-*.jar jpackage-input/app.jar

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package installer (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          jpackage `
            --type msi `
            --name "WarehouseManagementSystem" `
            --app-version "${{ steps.version.outputs.VERSION }}" `
            --vendor "Liamtseva" `
            --input jpackage-input/ `
            --main-jar app.jar `
            --main-class com.liamtseva.warehousemanagementsystem.Main `
            --dest dist/ `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut `
            --win-console `
            --icon src/main/resources/data/icon.ico `
            --java-options "--enable-native-access=ALL-UNNAMED" `
            --add-modules java.base,java.desktop,java.sql,java.naming,java.xml,java.scripting,java.management,jdk.unsupported

      - name: Package installer (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          jpackage \
            --type dmg \
            --name "WarehouseManagementSystem" \
            --app-version "${{ steps.version.outputs.VERSION }}" \
            --vendor "Liamtseva" \
            --input jpackage-input/ \
            --main-jar app.jar \
            --main-class com.liamtseva.warehousemanagementsystem.Main \
            --dest dist/ \
            --icon src/main/resources/data/icon.icns \
            --java-options "--enable-native-access=ALL-UNNAMED" \
            --add-modules java.base,java.desktop,java.sql,java.naming,java.xml,java.scripting,java.management,jdk.unsupported

      - name: Package installer (Linux DEB & RPM)
        if: matrix.os == 'ubuntu-latest'
        run: |
          jpackage \
            --type deb \
            --name "warehouse-management-system" \
            --app-version "${{ steps.version.outputs.VERSION }}" \
            --vendor "Liamtseva" \
            --input jpackage-input/ \
            --main-jar app.jar \
            --main-class com.liamtseva.warehousemanagementsystem.Main \
            --dest dist/ \
            --linux-shortcut \
            --icon src/main/resources/data/icon.png \
            --java-options "--enable-native-access=ALL-UNNAMED" \
            --add-modules java.base,java.desktop,java.sql,java.naming,java.xml,java.scripting,java.management,jdk.unsupported

          jpackage \
            --type rpm \
            --name "warehouse-management-system" \
            --app-version "${{ steps.version.outputs.VERSION }}" \
            --vendor "Liamtseva" \
            --input jpackage-input/ \
            --main-jar app.jar \
            --main-class com.liamtseva.warehousemanagementsystem.Main \
            --dest dist/ \
            --linux-shortcut \
            --icon src/main/resources/data/icon.png \
            --java-options "--enable-native-access=ALL-UNNAMED" \
            --add-modules java.base,java.desktop,java.sql,java.naming,java.xml,java.scripting,java.management,jdk.unsupported

          cp jpackage-input/app.jar dist/warehouse-management-system-fat.jar

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: dist/
          retention-days: 1

  publish-release:
    needs: build-installers
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: installers/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Warehouse Management System ${{ github.ref_name }}"
          body: |
            # 📦 Реліз: Warehouse Management System ${{ github.ref_name }}

            Дякуємо, що використовуєте автоматизовану систему управління складом! Ця версія була автоматично зібрана та містить найновіші стабільні зміни.

            ## 📥 Завантаження інсталяторів (Downloads)

            Оберіть інсталятор для своєї операційної системи:

            | Платформа | Формат файлу | Опис |
            | :--- | :--- | :--- |
            | **🖥️ Windows** | `*.msi` | Автономний інсталятор із майстром встановлення |
            | **🍏 macOS** | `*.dmg` | Образ диска (перетягніть у теку Програми) |
            | **🐧 Ubuntu / Debian** | `*.deb` | Пакунок для систем на базі APT |
            | **📦 RedHat / Fedora** | `*.rpm` | Пакунок для систем на базі YUM/DNF |
            | **☕ Кросплатформенно** | `*.jar` | Потребує встановленої **JRE 25** |

            ---

            ## ⚙️ Системні вимоги (System Requirements)
            * **Windows:** Windows 10 або новіша (x64)
            * **macOS:** macOS Monterey (12.0) або новіша
            * **Linux:** Ubuntu 22.04+, Fedora 38+ або еквівалентні
            * **Універсальний JAR:** Встановлений комплект [Java 25](https://adoptium.net/)

            ---

            <sub>*Автоматична збірка створена за допомогою GitHub Actions.</sub>

          files: installers/**
          draft: false
          prerelease: false
